name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  BACKEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/angularnetbase-backend
  FRONTEND_IMAGE: ${{ secrets.DOCKERHUB_USERNAME }}/angularnetbase-frontend

jobs:
  test-backend:
    name: Test Backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Strip frontend references from csproj
        run: |
          FILE=backend/AngularNetBase.API/AngularNetBase.API.csproj
          sed -i '/<ProjectReference.*frontend\.esproj/,/<\/ProjectReference>/d' "$FILE"
          sed -i '/<SpaRoot>/d; /<SpaProxyLaunchCommand>/d; /<SpaProxyServerUrl>/d' "$FILE"
          sed -i '/<PackageReference Include="Microsoft.AspNetCore.SpaProxy"/,/<\/PackageReference>/d' "$FILE"
          sed -i '/<PackageReference Include="Microsoft.AspNetCore.SpaProxy"[^>]*\/>/d' "$FILE"

      - name: Restore dependencies
        run: dotnet restore backend/AngularNetBase.API/AngularNetBase.API.csproj

      - name: Build
        run: dotnet build backend/AngularNetBase.API/AngularNetBase.API.csproj --no-restore

      - name: Test
        run: |
          TEST_PROJECTS=$(find backend -name '*Tests*.csproj' -o -name '*Test*.csproj')
          if [ -z "$TEST_PROJECTS" ]; then
            echo "No test projects found, skipping."
          else
            dotnet test $TEST_PROJECTS --verbosity normal
          fi

  test-frontend:
    name: Test Frontend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: frontend

      - name: Test
        run: npm test
        working-directory: frontend

  tag:
    name: Semantic Version Tag
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend]
    outputs:
      new_tag: ${{ steps.tag.outputs.new_tag }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine version bump and create tag
        id: tag
        run: |
          # Get the latest semver tag, default to v0.0.0
          LATEST_TAG=$(git tag --sort=-v:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -n1)
          if [ -z "$LATEST_TAG" ]; then
            LATEST_TAG="v0.0.0"
          fi
          echo "Latest tag: $LATEST_TAG"

          MAJOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$LATEST_TAG" | sed 's/v//' | cut -d. -f3)

          # Analyze commits since last tag for conventional commit prefixes
          if [ "$LATEST_TAG" = "v0.0.0" ]; then
            COMMITS=$(git log --pretty=format:"%s" HEAD)
          else
            COMMITS=$(git log --pretty=format:"%s" "${LATEST_TAG}..HEAD")
          fi

          BUMP="patch"

          if echo "$COMMITS" | grep -qiE '^feat(\(.*\))?!:|^fix(\(.*\))?!:|^refactor(\(.*\))?!:|BREAKING CHANGE'; then
            BUMP="major"
          elif echo "$COMMITS" | grep -qiE '^feat(\(.*\))?:'; then
            BUMP="minor"
          fi

          case $BUMP in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac

          NEW_TAG="v${MAJOR}.${MINOR}.${PATCH}"
          echo "Bump: $BUMP -> $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> "$GITHUB_OUTPUT"

          git tag "$NEW_TAG"
          git push origin "$NEW_TAG"

  docker-push:
    name: Build and Push Docker Images
    runs-on: ubuntu-latest
    needs: [tag]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: backend/Dockerfile
          push: true
          tags: ${{ env.BACKEND_IMAGE }}:${{ needs.tag.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: frontend/Dockerfile
          push: true
          tags: ${{ env.FRONTEND_IMAGE }}:${{ needs.tag.outputs.new_tag }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
